# Configuration Supabase CLI pour Syndory
# https://supabase.com/docs/guides/local-development/cli/config

project_id = "syndory"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://localhost:54321"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326
admin_email = "admin@syndory.com"
sender_name = "Syndory"

[storage]
enabled = true
file_size_limit = "20MiB"

[storage.buckets.avatars]
public = true
file_size_limit = "2MiB"
allowed_mime_types = ["image/jpeg", "image/png", "image/webp"]

[storage.buckets.resources]
public = false
file_size_limit = "20MiB"
allowed_mime_types = ["application/pdf", "application/msword", "application/vnd.openxmlformats-officedocument.wordprocessingml.document", "application/vnd.ms-powerpoint", "application/vnd.openxmlformats-officedocument.presentationml.presentation", "image/jpeg", "image/png"]

[storage.buckets.justificatifs]
public = false
file_size_limit = "10MiB"
allowed_mime_types = ["application/pdf", "image/jpeg", "image/png"]

[storage.buckets.annonces]
public = false
file_size_limit = "10MiB"
allowed_mime_types = ["application/pdf", "image/jpeg", "image/png", "application/msword"]

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000", "com.syndory.app://*"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = true

[auth.sms]
enable_signup = false
enable_confirmations = false

[auth.external.apple]
enabled = false

[auth.external.azure]
enabled = false

[auth.external.bitbucket]
enabled = false

[auth.external.discord]
enabled = false

[auth.external.facebook]
enabled = false

[auth.external.figma]
enabled = false

[auth.external.github]
enabled = false

[auth.external.gitlab]
enabled = false

[auth.external.google]
enabled = false

[auth.external.kakao]
enabled = false

[auth.external.keycloak]
enabled = false

[auth.external.linkedin]
enabled = false

[auth.external.linkedin_oidc]
enabled = false

[auth.external.notion]
enabled = false

[auth.external.twitch]
enabled = false

[auth.external.twitter]
enabled = false

[auth.external.slack]
enabled = false

[auth.external.spotify]
enabled = false

[auth.external.workos]
enabled = false

[auth.external.zoom]
enabled = false

[edge_runtime]
enabled = true
inspector_port = 10000

[functions.mark-presence]
verify_jwt = true

[functions.open-session]
verify_jwt = true

[functions.close-session]
verify_jwt = true

[functions.validate-progression]
verify_jwt = true

[functions.send-notification]
verify_jwt = true

[functions.generate-report]
verify_jwt = true

[functions.check-conflicts]
verify_jwt = true

[functions.cron-close-sessions]
verify_jwt = false
schedule = "* * * * *"

[functions.send-push]
verify_jwt = false

[functions.update-fcm-token]
verify_jwt = true

[analytics]
enabled = false
port = 54327
vector_port = 54328
gcp_jwt_path = ""

[experimental]
orioledb_version = ""
